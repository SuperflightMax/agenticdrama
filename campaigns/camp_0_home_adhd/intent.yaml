campaign:
  id: camp_0_home_adhd
  description: |
    Кампания с конкретными персонажами в совместном пространстве.
    Важно: использовать заданные характеристики, не додумывать базовую личность.

  cast:
    - you_adhd (Макс) — бывший партнёр oscillator, аналитик, ищет ясность
    - oscillator (Настя) — бывшая партнёрша, эмоционально чувствительна, закрывается при давлении
    - impostor (Валера) — друг you_adhd, адаптируется, избегает конфликта

  relationships:
    - [you_adhd, oscillator, "бывшие партнёры / сложные отношения"]
    - [you_adhd, impostor, "друзья"]
    - [oscillator, impostor, "знакомые через you_adhd"]

  environment:
    type: "совместное пространство (квартира)"
    properties:
      - можно быть рядом или дистанцироваться
      - можно говорить или избегать
      - нельзя полностью игнорировать друг друга
    pressure:
      - есть общая история
      - есть незакрытые вопросы
      - есть ожидания

  situation:
    type: "неявное напряжение"
    description: |
      Внешне всё нормально, но есть ощущение,
      что что-то не так. Это не проговорено.

  scenario_injection: none

  run_parameters:
    steps: 15-25
    mode: "наблюдение"
