scene:
  id: relax_outdoor
  title: "Отдых / парк / прогулка"

  type: "neutral_space"

  possibilities:
    - "можно двигаться и менять дистанцию"
    - "можно говорить свободнее"
    - "можно менять тему"
    - "можно входить в лёгкость, флирт или видимое примирение"

  constraints:
    - "сложно удерживать тяжёлый разговор долго"
    - "часть напряжения может уходить в рассеивание"
    - "серьёзность легко замаскировать под нормальный отдых"

  pressure:
    - "ожидание что здесь должно быть хорошо"
    - "контраст между красивой обстановкой и внутренним состоянием"

  hidden_dynamics:
    - "напряжение может временно исчезать и вернуться позже"
    - "или наоборот вылезать странной, непропорциональной реакцией"
    - "свобода пространства не гарантирует внутренней свободы"

  notes:
    - "годится для сцен, где хочется посмотреть на разницу между домом и нейтральной средой"
