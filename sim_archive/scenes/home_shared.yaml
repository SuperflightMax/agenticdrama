scene:
  id: home_shared
  title: "Дом / совместное жильё"

  type: "shared_space"

  possibilities:
    - "можно быть вместе или разойтись по разным зонам"
    - "можно начать разговор или избегать его"
    - "можно переключиться на бытовые действия"
    - "можно выйти из дома"

  constraints:
    - "полностью избежать друг друга сложно"
    - "личное воспринимается острее, чем в нейтральном месте"
    - "старые темы быстро становятся актуальными"

  pressure:
    - "накопленная история"
    - "ожидание нормальной совместной жизни"
    - "незакрытые темы"

  hidden_dynamics:
    - "старые обиды могут всплывать без прямого намерения"
    - "любое обсуждение легко становится личным"
    - "быт может использоваться как укрытие от настоящего разговора"

  notes:
    - "пространство лучше понимать как квартиру/дом с несколькими доступными зонами, а не как одну комнату"
