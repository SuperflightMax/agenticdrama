situation:
  id: need_to_decide
  title: "Надо решить"

  type: "decision"

  visible_prompt: "возник вопрос, который нельзя бесконечно откладывать: как делать дальше, куда идти, что выбирать, как жить ближайшее время"

  hidden_tension:
    - "каждый может понимать проблему по-своему"
    - "для одного это рациональный выбор, для другого — личная угроза"

  likely_axes:
    - "логика vs эмоции"
    - "контроль vs свобода"
    - "ясность vs избегание"

  notes:
    - "хорошая базовая ситуация почти для любого пространства"
