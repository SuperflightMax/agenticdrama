situation:
  id: something_is_off
  title: "Что-то не так"

  type: "tension"

  visible_prompt: "один или несколько персонажей ведут себя не как обычно; все чувствуют, что что-то съехало, но прямым текстом это ещё не названо"

  hidden_tension:
    - "настоящая проблема уже существует, но ещё не оформлена словами"
    - "люди начинают строить свои версии происходящего"

  likely_axes:
    - "чтение намёков vs прямой разговор"
    - "тревога vs рационализация"
    - "сближение vs закрытие"

  notes:
    - "подходит для медленного нарастания, без мгновенного взрыва"
