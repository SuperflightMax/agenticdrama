situation:
  id: mismatch_expectations
  title: "Несовпадение ожиданий"

  type: "mismatch"

  visible_prompt: "каждый входил в ситуацию с ощущением, что всё понятно, но по ходу оказывается, что ожидания у всех были разные"

  hidden_tension:
    - "люди долго не замечают рассинхрон"
    - "первой реакцией обычно становится недоумение, а не конфликт"

  likely_axes:
    - "близость vs дистанция"
    - "прямота vs сглаживание"
    - "роль vs живая спонтанность"

  notes:
    - "часто даёт самый узнаваемый бытовой конфликт: все уверены, что говорили об одном и том же"
