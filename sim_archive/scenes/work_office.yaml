scene:
  id: work_office
  title: "Работа / офис одного из персонажей"

  type: "work_space"

  possibilities:
    - "можно обсуждать задачу и решения"
    - "можно переводить разговор в деловой формат"
    - "можно прятать личное за рабочим"
    - "можно апеллировать к роли, статусу, ответственности"

  constraints:
    - "не всё допустимо выражать напрямую"
    - "эмоциональный срыв имеет социальную цену"
    - "кто-то в этом пространстве чувствует себя хозяином, а кто-то — гостем"

  pressure:
    - "результат"
    - "компетентность"
    - "оценка со стороны"
    - "ролевой дисбаланс"

  hidden_dynamics:
    - "личные конфликты могут маскироваться под деловые разногласия"
    - "напряжение часто выходит через решения, сроки и формулировки"
    - "статус усиливает неравенство восприятия"

  notes:
    - "подходит для кейсов, где один персонаж владелец, начальник или явно в своей среде"
